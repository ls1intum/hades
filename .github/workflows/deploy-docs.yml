name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
  pull_request:
    paths:
      - "website/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: website/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          cd website
          yarn install --immutable

      - name: Build website
        run: |
          cd website
          yarn build

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    uses: ls1intum/.github/.github/workflows/build-docs.yml@feat/docusaurus-gh-pages
    with:
      docs-path: website
      node-version: "22"
      environment: github-pages
